<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gig Ad Template</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#182449;
    --accent:#3B4FA6;
    --bg:#F6F4EF;
    --card-bg:#FBFAF7;
    --chip-bg:#E9ECFA;
    --chip-line:#C7CEEE;
    --green:#3EAA5D;
    --line:#D8D3C6;
    --muted:#5B6270;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 16px 60px;
    gap:18px;
  }
  .toolbar{
    width:100%;
    max-width:460px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .toolbar p{
    margin:0;
    font-size:13px;
    color:var(--muted);
    line-height:1.4;
  }
  #downloadBtn{
    flex-shrink:0;
    background:var(--ink);
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:transform .15s ease, background .15s ease;
  }
  #downloadBtn:hover{ background:var(--accent); }
  #downloadBtn:active{ transform:scale(0.97); }
  #downloadBtn:focus-visible, [contenteditable]:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
    border-radius:4px;
  }

  .card{
    width:100%;
    max-width:460px;
    aspect-ratio:4/5;
    background:var(--card-bg);
    border-radius:14px;
    padding:34px 28px 26px;
    display:flex;
    flex-direction:column;
    box-shadow:0 1px 3px rgba(24,36,73,0.08);
  }

  .headline-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }
  .headline{
    font-family:Arial, "Helvetica Neue", sans-serif;
    font-weight:900;
    letter-spacing:-0.01em;
    line-height:0.98;
  }
  .headline .line1{
    display:block;
    color:var(--ink);
    font-size:clamp(24px,7vw,32px);
  }
  .headline .line2{
    display:block;
    color:var(--accent);
    font-size:clamp(28px,8vw,38px);
    margin-top:2px;
  }
  .laptop{ flex-shrink:0; width:34%; max-width:150px; }

  .subtext{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--line);
    font-size:clamp(14px,3.6vw,16px);
    color:var(--ink);
    line-height:1.35;
  }
  .subtext .accent{ color:var(--accent); font-weight:700; }

  .features{
    margin-top:16px;
    padding-top:14px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    gap:8px;
    flex:1;
  }
  .feature{
    flex:1;
    display:flex;
    gap:8px;
    align-items:flex-start;
  }
  .feature .chip{
    flex-shrink:0;
    width:34px;
    height:34px;
    border-radius:50%;
    background:var(--chip-bg);
    border:1px solid var(--chip-line);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .feature .chip svg{ width:17px; height:17px; stroke:var(--accent); }
  .feature .label{
    font-size:clamp(10.5px,2.6vw,12px);
    font-weight:600;
    color:var(--ink);
    line-height:1.25;
  }

  .footer{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:10px;
  }
  .cta{
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    padding:11px 12px;
  }
  .cta svg{ width:16px; height:16px; stroke:var(--accent); flex-shrink:0; }
  .cta .cta-text{
    font-size:clamp(10px,2.6vw,11.5px);
    font-weight:700;
    color:var(--ink);
    line-height:1.3;
  }
  .cta .cta-text .accent{ color:var(--accent); }

  .badge{
    flex-shrink:0;
    width:112px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .badge .check{
    width:28px;
    height:28px;
    border-radius:50%;
    background:var(--green);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .badge .check svg{ width:14px; height:14px; stroke:#fff; }
  .badge .badge-text{
    font-size:10px;
    font-weight:700;
    color:var(--ink);
    line-height:1.25;
  }

  [contenteditable]{ cursor:text; border-radius:3px; }
  [contenteditable]:hover{ background:rgba(59,79,166,0.06); }

  @media (max-width:380px){
    .badge{ width:96px; }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <p>Tap any text on the card to edit it, then download your version as an image.</p>
    <button id="downloadBtn">Download PNG</button>
  </div>

  <div class="card" id="card">

    <div class="headline-row">
      <div class="headline">
        <span class="line1" contenteditable="true" spellcheck="false">I NEED A</span>
        <span class="line2" contenteditable="true" spellcheck="false">WEB DESIGNER</span>
      </div>
      <svg class="laptop" viewBox="0 0 140 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="6" width="124" height="80" rx="4" fill="#FBFAF7" stroke="#182449" stroke-width="3.5"/>
        <circle cx="20" cy="16" r="1.8" fill="#182449"/>
        <circle cx="27" cy="16" r="1.8" fill="#182449"/>
        <circle cx="34" cy="16" r="1.8" fill="#182449"/>
        <rect x="14" y="24" width="112" height="55" fill="#DDE3F7"/>
        <circle cx="93" cy="38" r="7" fill="#EFF2FA" opacity="0.9"/>
        <path d="M20 74 L48 46 L64 62 L84 40 L120 74 Z" fill="#BFC9EF"/>
        <rect x="20" y="90" width="40" height="4" rx="2" fill="#C9C3B4"/>
        <rect x="20" y="98" width="26" height="4" rx="2" fill="#C9C3B4"/>
        <path d="M2 86 L138 86 L128 104 L12 104 Z" fill="#182449"/>
      </svg>
    </div>

    <p class="subtext" contenteditable="true" spellcheck="false">to design my <span class="accent">complete website.</span></p>

    <div class="features">
      <div class="feature">
        <div class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>
        </div>
        <div class="label" contenteditable="true" spellcheck="false">Complete Website Design</div>
      </div>
      <div class="feature">
        <div class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="13" height="9" rx="1.2"/><rect x="16" y="4" width="6" height="16" rx="1.2"/></svg>
        </div>
        <div class="label" contenteditable="true" spellcheck="false">Responsive &amp; User Friendly</div>
      </div>
      <div class="feature">
        <div class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.6 8.5 8 10 4.4-1.5 8-5 8-10V6z"/><path d="M9 12l2 2 4-4"/></svg>
        </div>
        <div class="label" contenteditable="true" spellcheck="false">Clean &amp; Modern Design</div>
      </div>
    </div>

    <div class="footer">
      <div class="cta">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4z"/></svg>
        <div class="cta-text" contenteditable="true" spellcheck="false"><span class="accent">INTERESTED?</span> DM ME TO GET STARTED</div>
      </div>
      <div class="badge">
        <div class="check">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <div class="badge-text" contenteditable="true" spellcheck="false">FAIR PAY FOR GOOD WORK</div>
      </div>
    </div>

  </div>

<script>
  document.getElementById('downloadBtn').addEventListener('click', function(){
    const card = document.getElementById('card');
    html2canvas(card, {scale: 3, backgroundColor: '#FBFAF7'}).then(function(canvas){
      const link = document.createElement('a');
      link.download = 'web-designer-ad.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  });
</script>

</body>
</html>
